<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Password Reset Confirmation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#5bcba7",
              "primary-light": "#7ad9b8",
              "primary-dark": "#3db896",
              "background": "#f6f8f7",
              "dark-background": "#0f1f1b",
              "text-primary": "#000000",
              "dark-text-primary": "#ffffff",
              "text-secondary": "#4b5563",
              "dark-text-secondary": "#b0b9c3",
              "border-color": "#e5e7eb",
              "dark-border-color": "#374151",
              "card": "#ffffff",
              "dark-card": "#1a2c26",
              "input-bg": "#f3f4f6",
              "dark-input-bg": "#1f3a34",
              "foreground": "#ffffff",
              "dark-foreground": "#1a2c26",
              "muted": "#9ca3af",
              "dark-muted": "#6b7280",
            },
            fontFamily: {
              "display": ["Manrope", "Interstate", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "0.75rem",
              "xl": "1rem",
              "full": "9999px"
            },
            spacing: {
              "13": "3.25rem",
              "15": "3.75rem",
              "128": "32rem"
            },
            animation: {
              "fade-in": "fadeIn 0.5s ease-in-out",
              "slide-down": "slideDown 0.3s ease-out",
              "pulse-soft": "pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite",
            },
            keyframes: {
              fadeIn: {
                "0%": { opacity: "0" },
                "100%": { opacity: "1" }
              },
              slideDown: {
                "0%": { transform: "translateY(-10px)", opacity: "0" },
                "100%": { transform: "translateY(0)", opacity: "1" }
              }
            },
            boxShadow: {
              "glow": "0 0 20px rgba(91, 203, 167, 0.3)",
              "glow-lg": "0 0 40px rgba(91, 203, 167, 0.4)",
              "dark-glow": "0 0 20px rgba(91, 203, 167, 0.2)",
            }
          },
        },
      }
</script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<link rel="stylesheet" href="../css/Forget_password_4.css">
</head>
<body class="bg-background-light dark:bg-background-dark font-display animated-bg">
<div class="flex min-h-screen flex-col items-center justify-center p-4">
<div class="w-full max-w-md">
<div class="-mb-40 -mt-64 text-center">
<div class="flex justify-center items-center mb-4">
    <img class="h-90 w-180 object-contain" src="../assets/Logo.png" alt="Dentor logo"/>
</div>
</div>
<div class="rounded-xl bg-background-light dark:bg-subtle-dark/50 p-8 shadow-lg text-center">
<div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-primary/20 mb-6">
<span class="material-symbols-outlined text-primary text-4xl">
            check
          </span>
</div>
<h1 class="text-2xl font-bold mb-2" style="color: var(--text-primary);">Password Reset Successful!</h1>
<p class="mb-8" style="color: var(--text-secondary);">
          Your password has been updated. You can now log in with your new credentials.
        </p>
<a class="w-full rounded-lg bg-primary px-4 py-3 text-center font-semibold text-primary-contrast transition hover:bg-primary/90 mb-4" href="#">
          Back to Login
        </a>
</div>
</div>
</div>

</body>

</html>
