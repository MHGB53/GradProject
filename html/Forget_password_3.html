<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dentor - Reset Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#3fe4ad",
            "background-light": "#f6f8f7",
            "background-dark": "#11211c",
            "foreground-light": "#050505",
            "foreground-dark": "#fbfbfb",
            "card-light": "#ffffff",
            "card-dark": "#1a2c26",
            "muted-light": "#6b7280",
            "muted-dark": "#9ca3af",
            "border-light": "#e5e7eb",
            "border-dark": "#374151",
            "input-light": "#f6f8f7",
            "input-dark": "#2d3748"
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "0.75rem",
            "xl": "1rem",
            "full": "9999px"
          },
          boxShadow: {
            'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05)',
          }
        },
      },
    }
</script>
<script src="../js/themeManager.js"></script>
<script src="../js/tokengaurd.js"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="../css/Forget_password_3.css">

</head>
<body class="bg-background-light dark:bg-background-dark font-display animated-bg">
<div class="flex min-h-screen flex-col items-center justify-center p-4">
<div class="w-full max-w-md">
<div class="-mb-40 -mt-64 text-center">
<div class="flex justify-center items-center mb-4">
    <img class="h-90 w-180 object-contain" src="../assets/Logo.png" alt="Dentor logo"/>
</div>
</div>
<div class="rounded-xl bg-background-light dark:bg-subtle-dark/50 p-8 shadow-lg">
<div class="text-center">
<h1 class="text-3xl font-bold" style="color: var(--text-primary);">Reset Password</h1>
<p class="mt-2" style="color: var(--text-secondary);">Set your new password below.</p>
</div>
<form class="mt-8 space-y-6">
<div>
<label class="text-sm font-medium" style="color: var(--text-primary);" for="new-password">New Password</label>
<div class="mt-2 relative">
<input class="block w-full rounded-lg border-subtle-light bg-background-light p-3 text-text-light placeholder-placeholder-light focus:border-primary focus:outline-none focus:ring-primary dark:border-subtle-dark dark:bg-background-dark dark:text-text-dark dark:placeholder-placeholder-dark pr-10" id="new-password" name="new-password" placeholder="Enter new password" type="password"/>
<button type="button" id="toggleNewPassword" class="absolute top-1/2 right-3 -translate-y-1/2 text-gray-500 dark:text-gray-400 focus:outline-none" tabindex="-1">
<svg id="eyeIconNew" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
</svg>
</button>
</div>
</div>
<div>
<label class="text-sm font-medium" style="color: var(--text-primary);" for="confirm-password">Confirm New Password</label>
<div class="mt-2 relative">
<input class="block w-full rounded-lg border-subtle-light bg-background-light p-3 text-text-light placeholder-placeholder-light focus:border-primary focus:outline-none focus:ring-primary dark:border-subtle-dark dark:bg-background-dark dark:text-text-dark dark:placeholder-placeholder-dark pr-10" id="confirm-password" name="confirm-password" placeholder="Confirm new password" type="password"/>
<button type="button" id="toggleConfirmPassword" class="absolute top-1/2 right-3 -translate-y-1/2 text-gray-500 dark:text-gray-400 focus:outline-none" tabindex="-1">
<svg id="eyeIconConfirm" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
</svg>
</button>
</div>
</div>
<div>
<button class="w-full rounded-lg bg-primary px-4 py-3 text-center font-semibold text-primary-contrast transition hover:bg-primary/90 mb-4" type="submit">
            Reset Password
          </button>
</div>
</form>
<div class="text-center">
<a class="text-sm text-muted-light dark:text-muted-dark hover:text-foreground-light dark:hover:text-foreground-dark mt-8" href="#">Back to Login</a>
</div>
</div>
</div>

<script src="../js/Forget_password_3.js"></script>
</body>

</html>
