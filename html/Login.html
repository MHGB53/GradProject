<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dentor Login</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#50d3a7",
              "background-light": "#f6f8f7",
              "background-dark": "#131f1b",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
</script>
<script src="../js/themeManager.js"></script>
<link rel="stylesheet" href="../css/Login.css">

</head>
<body class="flex items-center justify-center min-h-screen font-display dental-bg animated-bg">
  <div class="flex items-center justify-center min-h-screen p-4">
  <div class="w-full max-w-md p-8 space-y-6 bg-background-light dark:bg-background-dark rounded-xl shadow-lg border border-primary/20 dark:border-primary/10">
<div class="text-center -mt-2">
<div class="flex justify-center items-center -mb-12 -mt-24">
    <img class="h-46 w-auto object-contain -mb-20" src="../assets/Logo.png" alt="Dentor logo"/>
</div>
<h2 class="text-center text-3xl font-bold text-gray-900 dark:text-white">Welcome to Dentor</h2>
<p class="text-center text-gray-600 dark:text-gray-400">Your dental student helper platform</p>
</div>
<form class="space-y-6">
  <div>
  <label class="text-sm font-medium text-gray-700 dark:text-gray-300" for="username">Username</label>
  <div class="mt-1">
  <input autocomplete="username" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary focus:border-primary bg-background-light dark:bg-background-dark/50 dark:border-gray-600 dark:placeholder-gray-500 dark:text-white dark:focus:ring-primary dark:focus:border-primary" id="username" name="username" placeholder="username" required="" type="text"/>
  </div>
  </div>
  <div>
  <div class="flex items-center justify-between">
  <label class="text-sm font-medium text-gray-700 dark:text-gray-300" for="password">Password</label>
  <div class="text-sm">
  <a class="font-medium text-primary hover:text-primary/80" href="#">Forgot Password?</a>
  </div>
  </div>
        <div class="mt-1 relative">
          <input autocomplete="current-password" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary focus:border-primary bg-background-light dark:bg-background-dark/50 dark:border-gray-600 dark:placeholder-gray-500 dark:text-white dark:focus:ring-primary dark:focus:border-primary pr-10" id="password" name="password" placeholder="••••••••" required type="password" />
          <button type="button" id="togglePassword" class="absolute top-1/2 right-3 -translate-y-1/2 text-gray-500 dark:text-gray-400 focus:outline-none" tabindex="-1">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
          </div>
    <div>
      <button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-black bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-background-light dark:focus:ring-offset-background-dark" type="submit">
                              Login
                          </button>
      </div>
</div>
</form>

</div>
<script src="../js/Login.js"></script>
</body>

</html>
