<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dentor - Forgot Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#5bcba7",
              "primary-light": "#7ad9b8",
              "primary-dark": "#3db896",
              "background": "#f6f8f7",
              "dark-background": "#111827",
              "text-primary": "#000000",
              "dark-text-primary": "#F9FAFB",
              "text-secondary": "#4b5563",
              "dark-text-secondary": "#9CA3AF",
              "border-color": "#e5e7eb",
              "dark-border-color": "#374151",
              "card": "#ffffff",
              "dark-card": "#1F2937",
              "input-bg": "#f3f4f6",
              "dark-input-bg": "#1f3a34",
              "foreground": "#ffffff",
              "dark-foreground": "#1a2c26",
              "muted": "#9ca3af",
              "dark-muted": "#6b7280",
            },
            fontFamily: {
              "display": ["Manrope", "Interstate", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "0.75rem",
              "xl": "1rem",
              "full": "9999px"
            },
            spacing: {
              "13": "3.25rem",
              "15": "3.75rem",
              "128": "32rem"
            },
            animation: {
              "fade-in": "fadeIn 0.5s ease-in-out",
              "slide-down": "slideDown 0.3s ease-out",
              "pulse-soft": "pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite",
            },
            keyframes: {
              fadeIn: {
                "0%": { opacity: "0" },
                "100%": { opacity: "1" }
              },
              slideDown: {
                "0%": { transform: "translateY(-10px)", opacity: "0" },
                "100%": { transform: "translateY(0)", opacity: "1" }
              }
            },
            boxShadow: {
              "glow": "0 0 20px rgba(91, 203, 167, 0.3)",
              "glow-lg": "0 0 40px rgba(91, 203, 167, 0.4)",
              "dark-glow": "0 0 20px rgba(91, 203, 167, 0.2)",
            }
          },
        },
      }
</script>
<script src="../js/themeManager.js"></script>
<script src="../js/tokengaurd.js"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="../css/Forget_password_1.css">
</head>
<body class="bg-background-light dark:bg-background-dark font-display animated-bg">
<div class="flex min-h-screen flex-col items-center justify-center p-4">
<div class="w-full max-w-md">
<div class="-mb-40 -mt-64 text-center">
<div class="flex justify-center items-center mb-4">
    <img class="h-90 w-180 object-contain" src="../assets/Logo.png" alt="Dentor logo"/>
</div>
</div>
<div class="rounded-xl bg-background-light dark:bg-subtle-dark/50 p-8 shadow-lg">
<div class="text-center">
<h2 class="text-2xl font-bold text-text-light dark:text-text-dark">Forgot Password?</h2>
<p class="mt-2 text-text-light/70 dark:text-text-dark/70">Enter your registered username to reset your password.</p>
</div>
<form class="mt-8 space-y-6">
<div>
<label class="text-sm font-medium text-text-light dark:text-text-dark" for="username">Email</label>
<input autocomplete="email" class="mt-2 block w-full rounded-lg border-subtle-light bg-background-light p-3 text-text-light placeholder-placeholder-light focus:border-primary focus:outline-none focus:ring-primary dark:border-subtle-dark dark:bg-background-dark dark:text-text-dark dark:placeholder-placeholder-dark" id="username" name="username" placeholder="Your email address" required="" type="email"/>
</div>
<div>
<button class="w-full rounded-lg bg-primary px-4 py-3 text-center font-semibold text-primary-contrast transition hover:bg-primary/90" type="submit">
                        Send Reset Link
                    </button>
</div>
</form>
<div class="mt-6 text-center">
<a class="text-sm font-medium text-primary hover:underline" href="Login.html">
                    Back to Login
                </a>
</div>
</div>
</div>
</div>
<script src="../js/Forget_password_1.js"></script>
</body>

</html>
